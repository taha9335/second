        <div class="altNeu-fz" id="an-alt-32"   data-partners="an-neu-b,an-neu-11"                style="left:534px;top:194px;width:259px;height:17px" title="32: Datum der Erstzulassung"></div>

        <div class="altNeu-fz" id="an-alt-33b"  data-partners="an-neu-22"                         style="left:269px;top:228px;width:524px;height:67px" title="33: Bemerkungen (Fortsetzung)"></div>

      <div class="altNeu-data-source">
        <strong>Datengrundlage:</strong><br>
        Deutsches Kfz-Gewerbe Zentralverband, 09/2005: Neue Fahrzeugdokumente<br>

<!-- modal injected via JS into body -->

<script>
(function() {

  /* ── Force desktop viewport on mobile ── */
  (function() {
    var existing = document.querySelector('meta[name="viewport"]');
    if (existing) {
      existing.setAttribute('content', 'width=860');
    } else {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=860';
      document.head.appendChild(meta);
    }
  })();



  /* ── Fix popup iframe text spacing ── */
  window.altNeuFixPopupText = function(iframe) {
    try {
      var doc = iframe.contentDocument || iframe.contentWindow.document;
      var style = doc.createElement('style');
      style.textContent = 'a, td, div, p, span { letter-spacing: normal !important; word-spacing: 4px !important; } a + a { margin-left: 8px !important; }';
      doc.head.appendChild(style);
    } catch(e) {}
  };

  /* ── Clear all ── */
  function clearAll() {
    document.querySelectorAll('.altNeu-fz.active').forEach(function(el){ el.classList.remove('active'); });
  }

  /* ── Bidirectional hover ── */
  document.querySelectorAll('.altNeu-fz').forEach(function(zone) {
    var partnerIds = (zone.getAttribute('data-partners') || '').split(',').filter(Boolean);

    function activate() {
      zone.classList.add('active');
      partnerIds.forEach(function(pid) {
        var el = document.getElementById(pid.trim());
        if (el) el.classList.add('active');
      });
    }
    function deactivate() {
      zone.classList.remove('active');
      partnerIds.forEach(function(pid) {
        var el = document.getElementById(pid.trim());
        if (el) el.classList.remove('active');
      });
    }
    zone.addEventListener('mouseenter', activate);
    zone.addEventListener('mouseleave', deactivate);
    zone.addEventListener('touchstart', function(e) {
      e.preventDefault();
      var was = zone.classList.contains('active');
      clearAll(); if (!was) activate();
    }, {passive: false});
  });

  document.addEventListener('touchstart', function(e) {
    if (!e.target.closest('.altNeu-fz')) clearAll();
  });

  /* ── Popups (neue image only) ── */
  var infoBase = 'https://taha9335.github.io/second/info-seiten-altnu/';
  var popupMap = {
    'an-neu-b':'b_erstzulassung.htm','an-neu-02-1':'02-1_code_22.htm','an-neu-02-2':'02-2_code_d2.htm',
    'an-neu-j':'j_fzg-klasse.htm','an-neu-04':'04_aufbau.htm','an-neu-e':'e_fzg-ident-nr.htm',
    'an-neu-03':'03_fzg-ident-nr.htm','an-neu-d1':'d1_marke.htm','an-neu-d2a':'d2_typ.htm',
    'an-neu-d2b':'d2_typ.htm','an-neu-d3':'d3_handelsbezeichnung.htm','an-neu-02':'02_hersteller.htm',
    'an-neu-05':'05_fzg-klasse.htm','an-neu-v9':'v9_schadstoffklasse.htm','an-neu-14':'14_emissionsklasse.htm',
    'an-neu-p3':'p3_kraftstoffart.htm','an-neu-10':'10_code_p3.htm','an-neu-14-1':'14-1_code_v9.htm',
    'an-neu-p1':'p1_hubraum.htm','an-neu-22':'22_bemerkungen.htm','an-neu-l':'l_achsen.htm',
    'an-neu-09':'09_antriebsachsen.htm','an-neu-p2-p4':'p2_p4_leistung.htm','an-neu-t':'t_geschwindigkeit.htm',
    'an-neu-18':'18_laenge.htm','an-neu-19':'19_breite.htm','an-neu-20':'20_hoehe.htm',
    'an-neu-g':'g_leermasse.htm','an-neu-12':'12_tankinhalt.htm','an-neu-13':'13_stuetzlast.htm',
    'an-neu-q':'q_leistungsgewicht.htm','an-neu-v7':'v7_co2.htm','an-neu-f1':'f1_zgm.htm',
    'an-neu-f2':'f2_zgm_staat.htm','an-neu-07-1':'07-1_achslast_max.htm','an-neu-07-2':'07-2_achslast_max.htm',
    'an-neu-07-3':'07-3_achslast_max.htm','an-neu-08-1':'08-1_achslast_max.htm',
    'an-neu-08-2':'08-2_achslast_max.htm','an-neu-08-3':'08-3_achslast_max.htm',
    'an-neu-u1':'u1_standgeraeusch.htm','an-neu-u2':'u2_drehzahl.htm','an-neu-u3':'u3_fahrgeraeusch.htm',
    'an-neu-o1':'o1_anhaengelast_gebremst.htm','an-neu-o2':'o2_anhaengelast_ungebremst.htm',
    'an-neu-s1':'s1_sitzplaetze.htm','an-neu-s2':'s2_stehplaetze.htm',
    'an-neu-15-1':'15-1_bereifung.htm','an-neu-15-2':'15-2_bereifung.htm','an-neu-15-3':'15-3_bereifung.htm',
    'an-neu-r':'r_farbe.htm','an-neu-11':'11_code_r.htm','an-neu-k':'k_eg-typ_abe.htm',
    'an-neu-06':'06_datum.htm','an-neu-17':'17_betriebserlaubnis.htm',
    'an-neu-16':'16_zulassungsbescheinigung.htm','an-neu-21':'21_vermerke.htm'
  };

  document.querySelectorAll('#altNeuNeuWrap .altNeu-fz').forEach(function(zone) {
    var url = popupMap[zone.id];
    if (url) {
      function openModal(e) { e.preventDefault(); altNeuShowInfo(infoBase + url); }
      zone.addEventListener('click', openModal);
      zone.addEventListener('touchend', openModal, {passive: false});
    }
  });

  // Alt Fahrzeugschein zones: open popup via partner's URL
  document.querySelectorAll('#altNeuAltWrap .altNeu-fz').forEach(function(zone) {
    var partners = (zone.getAttribute('data-partners') || '').split(',').filter(Boolean);
    var url = null;
    for (var i = 0; i < partners.length; i++) {
      var pid = partners[i].trim();
      if (popupMap[pid]) { url = popupMap[pid]; break; }
    }
    if (url) {
      (function(u) {
        function openModal(e) { e.preventDefault(); altNeuShowInfo(infoBase + u); }
        zone.addEventListener('click', openModal);
        zone.addEventListener('touchend', openModal, {passive: false});
      })(url);
    }
  });

  /* ── Inject modal into body to avoid z-index/overflow clipping ── */
  (function() {
    var m = document.createElement('div');
    m.id = 'altNeuModal';
    m.setAttribute('onclick', 'if(event.target===this)altNeuCloseInfo()');
    m.style.cssText = 'display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:2147483647;';
    m.innerHTML = '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:720px;max-width:96vw;height:560px;background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 6px 32px rgba(0,0,0,0.35);">'
      + '<div style="display:flex;justify-content:flex-end;align-items:center;padding:4px 8px;background:#eee;border-bottom:1px solid #ccc;">'
      + '<button onclick="altNeuCloseInfo()" style="border:none;background:none;font-size:22px;cursor:pointer;color:#555;padding:0 6px;line-height:1;">&#10005;</button>'
      + '</div>'
      + '<iframe id="altNeuFrame" style="width:100%;height:calc(100% - 32px);border:none;" src="about:blank"></iframe>'
      + '</div>';
    document.body.appendChild(m);
    document.getElementById('altNeuFrame').addEventListener('load', function() {
      altNeuFixPopupText(this);
    });
  })();

  window.altNeuFixPopupText = function(iframe) {
    try {
      var doc = iframe.contentDocument || iframe.contentWindow.document;
      if (!doc || !doc.body) return;
      var existing = doc.getElementById('altNeu-fix-style');
      if (existing) return;
      var style = doc.createElement('style');
      style.id = 'altNeu-fix-style';
      style.textContent = 'a { padding: 0 10px !important; display: inline-block !important; } td { word-spacing: normal !important; letter-spacing: normal !important; }';
      doc.head.appendChild(style);
      // Directly space out navigation links
      doc.querySelectorAll('a').forEach(function(a) {
        a.style.padding = '0 10px';
        a.style.display = 'inline-block';
      });
    } catch(e) {}
  };

  window.altNeuShowInfo = function(url) {
    var modal = document.getElementById('altNeuModal');
    var frame = document.getElementById('altNeuFrame');
    frame.src = url;
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
  };
  window.altNeuCloseInfo = function() {
    var modal = document.getElementById('altNeuModal');
    var frame = document.getElementById('altNeuFrame');
    modal.style.display = 'none';
    frame.src = 'about:blank';
    document.body.style.overflow = '';
  };
  window.addEventListener('message', function(e) { if (e.data === 'closeModal') window.altNeuCloseInfo(); });

})();
</script>
